<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TwiChek — Streamer Stats</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --accent: #9147ff;
  --accent-dark: #6b2fc7;
  --accent-glow: rgba(145, 71, 255, 0.35);
  --accent-glow-hover: rgba(145, 71, 255, 0.5);
  --live-color: #eb0400;
  --error-bg: rgba(255, 50, 50, 0.1);
  --error-border: rgba(255, 50, 50, 0.2);
  --error-text: #ff6868;
}

body {
  font-family: 'Poppins', sans-serif;
  min-height: 100vh;
  background-color: #0a0a0f;
  background-image: linear-gradient(0deg, transparent 24%, #1a1a1a 25%, #1a1a1a 26%, transparent 27%, transparent 74%, #1a1a1a 75%, #1a1a1a 76%, transparent 77%, transparent),
                    linear-gradient(90deg, transparent 24%, #1a1a1a 25%, #1a1a1a 26%, transparent 27%, transparent 74%, #1a1a1a 75%, #1a1a1a 76%, transparent 77%, transparent);
  background-size: 55px 55px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 48px 20px 60px;
}

.ts-inner {
  width: 100%;
  max-width: 600px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 36px;
}

.ts-logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
}

.ts-icon {
  width: 56px;
  height: 56px;
  background: var(--accent);
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 30px rgba(145, 71, 255, 0.35);
}

.ts-icon svg { width: 32px; height: 32px; fill: white; }
.ts-title { font-size: 28px; font-weight: 700; color: #fff; letter-spacing: -0.5px; }
.ts-subtitle { font-size: 13px; color: #555; margin-top: -6px; }

.ts-card {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 20px;
  padding: 24px;
}

.ts-input-row {
  display: flex;
  gap: 10px;
}

.ts-input {
  flex: 1;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 14px 18px;
  color: #fff;
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  outline: none;
}
.ts-input::placeholder { color: #555; }
.ts-input:focus { border-color: rgba(145, 71, 255, 0.55); background: rgba(255,255,255,0.08); }

.ts-btn {
  background: var(--accent);
  border: none;
  border-radius: 12px;
  padding: 14px 22px;
  color: white;
  font-family: 'Poppins', sans-serif;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  box-shadow: 0 4px 20px rgba(145, 71, 255, 0.35);
  transition: 0.15s;
}
.ts-btn:hover { opacity: 0.9; transform: translateY(-1px); }
.ts-btn:active { transform: scale(0.97); }
.ts-btn:disabled { opacity: 0.5; cursor: not-allowed; }

.ts-status {
  display: none;
  align-items: center;
  gap: 10px;
  padding: 14px 18px;
  border-radius: 12px;
  font-size: 13px;
  margin-top: 14px;
}
.ts-status.loading { display: flex; background: rgba(255,255,255,0.05); color: #888; }
.ts-status.error { display: flex; background: rgba(255, 50, 50, 0.1); border: 1px solid rgba(255, 50, 50, 0.2); color: #ff6868; }

.spinner {
  width: 16px;
  height: 16px;
  border: 2px solid rgba(255,255,255,0.15);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.ts-result {
  display: none;
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 20px;
  overflow: hidden;
}

.ts-live-wrap {
  position: relative;
  aspect-ratio: 16/9;
  background: #0a0a0f;
}
.ts-live-img { width: 100%; height: 100%; object-fit: cover; display: block; }
.ts-live-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.88) 100%);
  pointer-events: none;
}
.ts-live-badge {
  position: absolute;
  top: 14px;
  left: 16px;
  background: rgba(235, 4, 0, 0.65);
  backdrop-filter: blur(4px);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  padding: 4px 10px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  gap: 6px;
  text-transform: uppercase;
}
.live-dot {
  width: 7px;
  height: 7px;
  background: #fff;
  border-radius: 50%;
  animation: livepulse 1.2s infinite;
}
@keyframes livepulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

.ts-live-viewers {
  position: absolute;
  top: 14px;
  right: 16px;
  background: rgba(0,0,0,0.6);
  color: #fff;
  font-size: 12px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  gap: 5px;
}
.ts-live-info {
  position: absolute;
  bottom: 16px;
  left: 20px;
  right: 20px;
}
.ts-live-game { font-size: 11px; color: var(--accent); font-weight: 600; text-transform: uppercase; margin-bottom: 3px; }
.ts-live-title { font-size: 15px; font-weight: 600; color: #fff; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

.ts-offline-wrap {
  padding: 28px 24px;
  display: flex;
  align-items: center;
  gap: 18px;
  background: rgba(145,71,255,0.06);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.ts-avatar { width: 72px; height: 72px; border-radius: 50%; object-fit: cover; border: 3px solid rgba(145,71,255,0.5); flex-shrink: 0; }
.ts-offline-info { display: flex; flex-direction: column; gap: 4px; }
.ts-username { font-size: 20px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 8px; }
.ts-offline-label { font-size: 11px; font-weight: 600; color: #555; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.08); padding: 2px 9px; border-radius: 6px; }

.ts-live-profile {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 20px;
  background: rgba(145,71,255,0.06);
  border-bottom: 1px solid rgba(255,255,255,0.06);
}
.ts-avatar-sm { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; border: 2px solid var(--accent); }
.ts-live-name { font-size: 16px; font-weight: 700; color: #fff; }
.ts-live-sub { font-size: 12px; color: #666; }

.ts-result-body {
  padding: 20px 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.ts-stats-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}
.ts-stat-card {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: 14px;
  padding: 14px 16px;
}
.ts-stat-label { font-size: 11px; color: #555; display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
.ts-stat-label i { font-size: 13px; color: var(--accent); }
.ts-stat-value { font-size: 18px; font-weight: 700; color: #fff; }
.ts-stat-value.live-val { color: var(--live-color); }

.ts-open-btn {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 13px;
  border-radius: 12px;
  font-weight: 600;
  background: var(--accent);
  color: white;
  text-decoration: none;
  box-shadow: 0 4px 18px rgba(145,71,255,0.35);
  transition: 0.15s;
}
.ts-open-btn:hover { opacity: 0.88; transform: translateY(-1px); }

.ts-footer {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  font-size: 12px;
  color: #333;
}
.ts-footer-author { font-size: 13px; font-weight: 600; color: #444; }
.ts-footer-author span { color: var(--accent); }

.ts-lang {
  position: fixed;
  top: 18px;
  right: 20px;
  display: flex;
  gap: 8px;
  z-index: 100;
}
.ts-lang-btn {
  width: 38px;
  height: 28px;
  border-radius: 6px;
  border: 1px solid rgba(255,255,255,0.1);
  cursor: pointer;
  background: none;
  opacity: 0.45;
  transition: 0.15s;
}
.ts-lang-btn.active { border-color: var(--accent); opacity: 1; box-shadow: 0 0 0 1px var(--accent); }
.ts-lang-btn svg { width: 100%; height: 100%; display: block; }

@media (max-width: 480px) {
  body { padding: 32px 14px; }
  .ts-title { font-size: 22px; }
  .ts-input-row { flex-direction: column; }
  .ts-btn { justify-content: center; }
}
</style>
</head>
<body>

<div class="ts-lang">
  <button class="ts-lang-btn active" id="lang-en" onclick="setLang('en')">
    <svg viewBox="0 0 38 28"><rect width="38" height="28" fill="#012169"/><path d="M0,0 L38,28 M38,0 L0,28" stroke="#fff" stroke-width="4.5"/><path d="M0,0 L38,28 M38,0 L0,28" stroke="#C8102E" stroke-width="3"/><path d="M19,0 V28 M0,14 H38" stroke="#fff" stroke-width="7.5"/><path d="M19,0 V28 M0,14 H38" stroke="#C8102E" stroke-width="4.5"/></svg>
  </button>
  <button class="ts-lang-btn" id="lang-ru" onclick="setLang('ru')">
    <svg viewBox="0 0 38 28"><rect width="38" height="9.33" fill="#fff"/><rect y="9.33" width="38" height="9.33" fill="#0039A6"/><rect y="18.67" width="38" height="9.33" fill="#D52B1E"/></svg>
  </button>
</div>

<div class="ts-inner">
  <div class="ts-logo">
    <div class="ts-icon"><svg viewBox="0 0 24 24"><path d="M11.571 4.714h1.715v5.143H11.57zm4.715 0H18v5.143h-1.714zM6 0L1.714 4.286v15.428h5.143V24l4.286-4.286h3.428L22.286 12V0zm14.571 11.143l-3.428 3.428h-3.429l-3 3v-3H6.857V1.714h13.714z"/></svg></div>
    <div class="ts-title">TwiChek</div>
    <div class="ts-subtitle" id="ts-subtitle">Look up any Twitch streamer — live status & stats</div>
  </div>

  <div class="ts-card">
    <div class="ts-input-row">
      <input class="ts-input" id="ts-url" type="text" placeholder="Enter Twitch username…" autocomplete="off" />
      <button class="ts-btn" id="ts-fetchbtn" onclick="tsFetch()"><i class="ti ti-search"></i> <span id="ts-fetch-label">Search</span></button>
    </div>
    <div class="ts-status" id="ts-status"><div class="spinner" id="ts-spinner"></div><span id="ts-status-text">Fetching…</span></div>
  </div>

  <div class="ts-result" id="ts-result">
    <div id="ts-live-section" style="display:none;">
      <div class="ts-live-wrap">
        <img class="ts-live-img" id="ts-preview-img" />
        <div class="ts-live-overlay"></div>
        <div class="ts-live-badge"><div class="live-dot"></div> LIVE</div>
        <div class="ts-live-viewers"><i class="ti ti-users"></i> <span id="ts-viewers">0</span></div>
        <div class="ts-live-info">
          <div class="ts-live-game" id="ts-game"></div>
          <div class="ts-live-title" id="ts-stream-title"></div>
        </div>
      </div>
      <div class="ts-live-profile">
        <img class="ts-avatar-sm" id="ts-avatar-live" />
        <div><div class="ts-live-name" id="ts-name-live"></div><div class="ts-live-sub" id="ts-live-sub"></div></div>
      </div>
    </div>

    <div id="ts-offline-section" style="display:none;">
      <div class="ts-offline-wrap">
        <img class="ts-avatar" id="ts-avatar-off" />
        <div class="ts-offline-info">
          <div class="ts-username"><span id="ts-name-off"></span><span class="ts-offline-label" id="ts-offline-label">Offline</span></div>
        </div>
      </div>
    </div>

    <div class="ts-result-body">
      <div class="ts-stats-grid">
        <div class="ts-stat-card">
          <div class="ts-stat-label"><i class="ti ti-calendar"></i> <span id="lbl-created">Created</span></div>
          <div class="ts-stat-value" id="ts-stat-created">—</div>
        </div>
        <div class="ts-stat-card" id="ts-uptime-card" style="display:none;">
          <div class="ts-stat-label"><i class="ti ti-clock"></i> <span id="lbl-uptime">Stream Time</span></div>
          <div class="ts-stat-value" id="ts-stat-uptime">—</div>
        </div>
      </div>
      <a class="ts-open-btn" id="ts-twitch-link" href="#" target="_blank"><i class="ti ti-brand-twitch"></i> <span id="lbl-open">Open on Twitch</span></a>
    </div>
  </div>
  <div class="ts-footer"><div class="ts-footer-author">by <span>SantianDev</span></div><div class="ts-footer-sub">TwiChek — open source</div></div>
</div>

<script>
  let currentLang = 'en';
  const i18n = {
    en: { subtitle: 'Look up any Twitch streamer — live status & stats', placeholder: 'Enter Twitch username…', searchLabel: 'Search', fetching: 'Fetching data…', noInput: 'Please enter a Twitch username.', notFound: 'Streamer not found.', networkErr: 'Network error. Try again.', offline: 'Offline', created: 'Created', uptime: 'Stream Time', open: 'Open on Twitch' },
    ru: { subtitle: 'Найдите любого стримера на Twitch — статус и статистика', placeholder: 'Введите ник стримера…', searchLabel: 'Найти', fetching: 'Загружаем данные…', noInput: 'Введите ник стримера.', notFound: 'Стример не найден.', networkErr: 'Ошибка сети. Попробуйте снова.', offline: 'Офлайн', created: 'Создан', uptime: 'Время стрима', open: 'Открыть на Twitch' }
  };
  function t(k) { return i18n[currentLang][k] || k; }
  function setLang(lang) {
    currentLang = lang;
    document.getElementById('lang-en').classList.toggle('active', lang === 'en');
    document.getElementById('lang-ru').classList.toggle('active', lang === 'ru');
    document.getElementById('ts-subtitle').textContent = t('subtitle');
    document.getElementById('ts-url').placeholder = t('placeholder');
    document.getElementById('ts-fetch-label').textContent = t('searchLabel');
    document.getElementById('lbl-created').textContent = t('created');
    document.getElementById('lbl-uptime').textContent = t('uptime');
    document.getElementById('lbl-open').textContent = t('open');
    document.getElementById('ts-offline-label').textContent = t('offline');
  }

  const DECAPI = 'https://decapi.me/twitch';
  const PROXY = 'https://api.allorigins.win/raw?url=';
  async function pfetch(url) {
    const res = await fetch(PROXY + encodeURIComponent(url));
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res;
  }

  async function tsFetch() {
    const username = document.getElementById('ts-url').value.trim().toLowerCase();
    const statusDiv = document.getElementById('ts-status');
    const resultDiv = document.getElementById('ts-result');
    const btn = document.getElementById('ts-fetchbtn');
    statusDiv.className = 'ts-status';
    resultDiv.style.display = 'none';
    if (!username) { showError(t('noInput')); return; }
    statusDiv.className = 'ts-status loading';
    document.getElementById('ts-spinner').style.display = 'block';
    document.getElementById('ts-status-text').textContent = t('fetching');
    btn.disabled = true;

    try {
      const [avatarRes, followersRes, createdRes, uptimeRes] = await Promise.all([
        pfetch(`${DECAPI}/avatar/${username}`),
        pfetch(`${DECAPI}/followcount/${username}`),
        pfetch(`${DECAPI}/creation/${username}?format=d.m.Y`),
        pfetch(`${DECAPI}/uptime/${username}`)
      ]);
      const avatarUrl = await avatarRes.text();
      const followers = await followersRes.text();
      const created = await createdRes.text();
      const uptimeRaw = await uptimeRes.text();
      if (followers.includes('invalid') || avatarUrl.includes('error')) { showError(t('notFound')); btn.disabled = false; return; }
      const isLive = !uptimeRaw.toLowerCase().includes('offline') && !uptimeRaw.includes('error') && !uptimeRaw.includes('is not live');
      let game = '', streamTitle = '', viewers = '—';
      if (isLive) {
        try {
          const [gameRes, titleRes, viewersRes] = await Promise.all([
            pfetch(`${DECAPI}/game/${username}`),
            pfetch(`${DECAPI}/status/${username}`),
            pfetch(`${DECAPI}/viewers/${username}`)
          ]);
          game = await gameRes.text();
          streamTitle = await titleRes.text();
          const viewersText = await viewersRes.text();
          if (!viewersText.includes('error') && !viewersText.includes('404')) viewers = viewersText.trim() || '—';
        } catch(e) { viewers = '—'; }
      }
      buildResult({ username, avatarUrl: avatarUrl.trim(), followers: followers.trim(), created: created.trim(), isLive, uptime: uptimeRaw.trim(), game: game.trim(), streamTitle: streamTitle.trim(), viewers });
      resultDiv.style.display = 'block';
      statusDiv.className = 'ts-status';
    } catch(e) { showError(t('networkErr')); console.error(e); }
    btn.disabled = false;
  }

  function buildResult(d) {
    const { username, avatarUrl, followers, created, isLive, uptime, game, streamTitle, viewers } = d;
    document.getElementById('ts-avatar-live').src = avatarUrl;
    document.getElementById('ts-avatar-off').src = avatarUrl;
    document.getElementById('ts-name-live').textContent = username;
    document.getElementById('ts-name-off').textContent = username;
    document.getElementById('ts-live-section').style.display = isLive ? 'block' : 'none';
    document.getElementById('ts-offline-section').style.display = isLive ? 'none' : 'block';
    document.getElementById('ts-uptime-card').style.display = isLive ? '' : 'none';
    document.getElementById('ts-stat-created').textContent = created;
    if (isLive) {
      const previewUrl = `https://static-cdn.jtvnw.net/previews-ttv/live_user_${username}-640x360.jpg?t=${Date.now()}`;
      document.getElementById('ts-preview-img').src = previewUrl;
      document.getElementById('ts-game').textContent = game || '';
      document.getElementById('ts-stream-title').textContent = streamTitle || '';
      document.getElementById('ts-viewers').textContent = fmtNum(viewers);
      document.getElementById('ts-live-sub').textContent = `${fmtNum(followers)} followers`;
      document.getElementById('ts-stat-uptime').textContent = uptime;
    }
    document.getElementById('ts-twitch-link').href = `https://twitch.tv/${username}`;
  }

  function fmtNum(val) {
    if (val === '—') return '—';
    const n = parseInt(String(val).replace(/[^0-9]/g, ''), 10);
    if (isNaN(n)) return val;
    if (n >= 1_000_000) return (n/1_000_000).toFixed(1).replace('.0','')+'M';
    if (n >= 1_000) return (n/1_000).toFixed(1).replace('.0','')+'K';
    return n.toLocaleString();
  }

  function showError(msg) {
    const status = document.getElementById('ts-status');
    document.getElementById('ts-spinner').style.display = 'none';
    document.getElementById('ts-status-text').textContent = msg;
    status.className = 'ts-status error';
  }
  document.getElementById('ts-url').addEventListener('keydown', e => e.key === 'Enter' && tsFetch());
</script>
</body>
</html>
